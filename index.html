<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星座数独</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">益智小游戏·星座数独</p>
          <p class="intro" id="dailyQuote">每日名言加载中...</p>
        </div>
        <section class="profile" aria-live="polite">
          <strong id="totalSolved">已通关 0</strong>
          <span id="masterSolved">大师 0 / 10 解锁星座</span>
          <button id="resetProgressBtn" type="button">清空进度</button>
        </section>
      </header>

      <nav class="main-tabs" aria-label="玩法导航">
        <button class="nav-tab active" data-view="library">题库模式</button>
        <button class="nav-tab" data-view="zodiac">十二星座</button>
      </nav>

      <section id="libraryView" class="view active">
        <div class="mode-grid">
          <button class="mode-card active" data-difficulty="easy">
            <span>简单版</span>
            <strong>500题</strong>
            <small id="easyCount">已通关 0 / 500</small>
          </button>
          <button class="mode-card" data-difficulty="normal">
            <span>普通版</span>
            <strong>500题</strong>
            <small id="normalCount">已通关 0 / 500</small>
          </button>
          <button class="mode-card" data-difficulty="master">
            <span>大师版</span>
            <strong>500题</strong>
            <small id="masterCount">已通关 0 / 500</small>
          </button>
        </div>

        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">自由选题</p>
              <h2 id="libraryTitle">简单版题库</h2>
            </div>
            <div class="pager">
              <button id="prevPageBtn" type="button">上一页</button>
              <span id="pageLabel">1 / 10</span>
              <button id="nextPageBtn" type="button">下一页</button>
            </div>
          </div>
          <div class="puzzle-list" id="puzzleList"></div>
        </section>
      </section>

      <section id="zodiacView" class="view">
        <section class="panel zodiac-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">大师试炼</p>
              <h2>十二星座图案玩法</h2>
            </div>
            <span class="unlock-pill" id="zodiacUnlockText">通关 10 个大师版后解锁</span>
          </div>
          <p class="zodiac-desc">每个星座都是一个 3x3 矩阵，9 个锁分别对应 9 局数独，随机搭配简单版、普通版和大师版。全部解锁后显示对应星座图案。</p>
          <div class="zodiac-layout">
            <div class="zodiac-list" id="zodiacList"></div>
            <div class="zodiac-detail" id="zodiacDetail"></div>
          </div>
        </section>
      </section>

      <section id="gameView" class="game-view" hidden>
        <aside class="game-side">
          <button id="backBtn" type="button" class="ghost-btn">返回题库</button>
          <h2 id="gameTitle">简单版 第1题</h2>
          <p id="gameMeta">步数 0 · 用时 00:00</p>
          <div class="game-actions">
            <button id="hintBtn" type="button">提示</button>
            <button id="eraseBtn" type="button">擦除</button>
            <button id="restartBtn" type="button">重开本题</button>
          </div>
          <div class="note" id="gameNote">点击空格后，用下方数字键填入答案。</div>
        </aside>

        <section class="sudoku-stage">
          <div class="sudoku-top">
            <span id="mistakeText">错误：0 / 3</span>
            <span id="statusText">继续思考</span>
          </div>
          <div class="sudoku-board" id="sudokuBoard"></div>
          <div class="number-pad" id="numberPad"></div>
        </section>
      </section>
    </main>

    <div class="win-modal" id="winModal" hidden>
      <div class="win-backdrop"></div>
      <section class="win-card" role="dialog" aria-modal="true" aria-labelledby="winTitle">
        <div class="sparkles" aria-hidden="true"></div>
        <strong class="win-badge">WIN</strong>
        <h2 id="winTitle">通关成功</h2>
        <p id="winText">这一题完成得漂亮。</p>
        <div class="modal-actions">
          <button id="nextPuzzleBtn" type="button">下一题</button>
          <button id="winCloseBtn" type="button">回到列表</button>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
